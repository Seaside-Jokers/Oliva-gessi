<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Oliva Gessi</title>
    <link rel="stylesheet" href="src/style.css">
    <link rel="alternate" hreflang="en" href="index.html">
    <link rel="alternate" hreflang="it" href="index.html">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
</head>
<body>
    <!-- ======================================================================= -->
    <!--                                 NAVBAR                                  -->
    <!-- ======================================================================= -->
    <nav class="navbar">
        <!-- Home -->
        <button class="btn-navbar" type="button" onclick="toggleMenu()">
            <icon-el src="assets/menu.svg"></icon-el>
            <span data-key="home" class="nav-data">Menu</span>
        </button>
        <!-- About us-->
        <button class="btn-navbar" type="button" onclick="location.href='about-us.html'">
            <icon-el src="assets/about-us.svg"></icon-el>
            <span data-key="about" class="nav-data">Il team</span>
        </button>
        <!-- Cambio lingua (a destra) -->
        <button class="btn-navbar lang-button" type="button" onclick="changeLang()">
            <span class="lang-toggle-data">IT</span>
            <span class="lang-toggle">
                <span class="lang-knob" id="lang-knob"></span>
            </span>
            <span class="lang-toggle-data">EN</span>
        </button>
    </nav>
    <!-- ======================================================================= -->
    <!--                                 SIDEBAR                                 -->
    <!-- ======================================================================= -->
    <!-- Strato trasparente che permette di chiudere il menu cliccando fuori -->
    <div class="clicker" onclick="closeMenu()"></div>
    <!-- Menu laterale vero e proprio -->
    <div class="sidebar" id="sidebar">
        <!-- Chiudi il menu -->
        <button class="sidebar-button" type="button" onclick="closeMenu()">
            <icon-el src="assets/close.svg" class="large"></icon-el>
            <span data-key="close_menu" class="side-data">Chiudi</span>
        </button>
        <!-- Homepage -->
        <button class="sidebar-button" type="button" onclick="location.href='index.html'">
            <icon-el src="assets/home.svg" class="large"></icon-el>
            <span data-key="homepage" class="side-data">Pagina principale</span>
        </button>
        <!-- About us -->
        <button class="sidebar-button" type="button" onclick="location.href='about-us.html'">
            <icon-el src="assets/about-us.svg" class="large"></icon-el>
            <span data-key="about" class="side-data">Il team</span>
        </button>
        <!-- Impostazioni -->
        <button class="sidebar-button" type="button" onclick="location.href='settings.html'">
            <icon-el src="assets/settings.svg" class="large"></icon-el>
            <span data-key="settings" class="side-data">Impostazioni</span>
        </button>
        <details>
            <!-- Le varie pagine del file -->
            <summary data-key="cerca_pagina" class="side-data"></summary>
        </details>
    </div>
    <!-- ======================================================================= -->
    <!--                                CONTENUTO                                -->
    <!-- ======================================================================= -->
    <div class="settings-block">
        <p data-key="cambio_colore" class="settings-title">Ciao</p>
        <span class="settings-container">
            <button data-key="sys_default" class="settings-item selected tema" id="def_theme">Default</button>
            <button data-key="light_mode" class="settings-item tema" id="light_theme">Chiaro</button>
            <button data-key="dark_mode" class="settings-item tema" id="dark_theme">Scuro</button>
        </span>
    </div>
    <!-- ======================================================================= -->
    <!--                      DO NOT TOUCH BELOW THIS LINE                       -->
    <!-- ======================================================================= -->
    <script src="src/database_testo.js"></script>
    <script src="src/color_scheme.js"></script>
    <script src="src/sidebar.js"></script>
    <script src="src/homepage.js"></script>
    <script src="src/icon_manager.js"></script>
    <script src="src/settings.js"></script>
</body>
</html>

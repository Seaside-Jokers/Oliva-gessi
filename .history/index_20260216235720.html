<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Oliva Gessi</title>
    <link rel="stylesheet" href="src/style.css">
    <link rel="alternate" hreflang="en" href="index.html">
    <link rel="alternate" hreflang="it" href="index.html">
</head>
<body>
    <!-- - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - -->
    <!--                                 NAVBAR                                -->
    <!-- - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - -->
    <nav class="navbar">
        <!-- Home -->
        <button class="btn-navbar" type="button" onclick="toggleMenu()">
            <img src="assets/menu_icon.png" data-key="home" alt="Home" class="icone" id="navbar-button">
            <span data-key="home" class="navData">Menu</span>
        </button>
        <!-- About us-->
        <button class="btn-navbar" type="button">
            <img src="assets/about_us.png" data-key="about" alt="Chi siamo" class="icone">
            <span data-key="about" class="navData">Chi siamo</span>
        </button>
        <!-- Cambio lingua (a destra) -->
        <button class="btn-navbar lang-button" type="button">
            <img src="assets/language.png" data-key="language" alt="Cambia lingua" class="icone"
             onclick="changeLang()">
            <span data-key="current_language" class="navData">IT</span>
        </button>
    </nav>
    <!-- - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - -->
    <!--                                 SIDEBAR                               -->
    <!-- - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - -->
    <!-- Strato trasparente che permette di chiudere il menu cliccando fuori -->
    <div class="clicker" onclick="closeMenu()"></div>
    <!-- Menu laterale vero e proprio -->
    <div class="sidebar" id="sidebar">
        <button class="sidebar-button" type="button">
            <img src="assets/">
        </button>
    </div>

    <h2 data-key="titolo">Vieni a conoscere Oliva Gessi!</h2>

    <!-- - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - -->
    <!--                              DO NOT TOUCH                             -->
    <!-- - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - -->
    <script src="src/database_testo.js"></script>
    <script src="src/color_scheme.js"></script>
    <script src="src/sidebar.js"></script>
</body>

<!-- TODO: leggi questo commento e poi eliminalo per favore: quando vuoi aggiungere un nuovo testo modificalo in src/database_testo.js -->
</html>
